# Arquivo de Configuração do Script de Backup
# Edite este arquivo para personalizar as configurações do backup

# Diretórios
SOURCE_DIR="/var/www/html"                    # Diretório de origem para backup
LOCAL_BACKUP_DIR="/backup"                     # Diretório local para armazenar backups
LOG_FILE="/var/log/backup.log"                 # Arquivo de log

# Configurações S3
S3_BUCKET="s3://meu-bucket-backup"            # Bucket S3 (substitua pelo seu bucket)
S3_PREFIX="backups"                           # Prefixo/pasta no bucket S3
S3_STORAGE_CLASS="STANDARD_IA"                 # Classe de armazenamento (STANDARD, STANDARD_IA, GLACIER)

# Políticas de Retenção
RETENTION_DAYS=7                               # Dias para manter backups no S3
MAX_LOCAL_BACKUPS=5                            # Número máximo de backups locais

# Configurações Avançadas
COMPRESSION_LEVEL=6                            # Nível de compressão (1-9, onde 9 é máxima)
ENABLE_ENCRYPTION=false                        # Habilitar criptografia GPG
EMAIL_NOTIFICATIONS=false                      # Enviar notificações por email
EMAIL_TO="admin@example.com"                   # Email para notificações

# Configurações de Performance
PARALLEL_UPLOADS=false                         # Upload paralelo para arquivos grandes
BANDWIDTH_LIMIT=""                             # Limite de banda em KB/s (ex: 1024)

# Configurações de Verificação
ENABLE_CHECKSUM=true                           # Verificar checksum após upload
VERIFY_S3_INTEGRITY=true                       # Verificar integridade no S3